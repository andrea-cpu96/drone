# Simulation mode: motor commands are printed to the console so the
# host-side drone simulation can read them.
CONFIG_SIMULATION_MODE=n

# Enable floating-point support in printf/printk so the altitude (in meters,
# with decimals) can be logged with "%f". Without this, "%f" is not formatted
# and would also corrupt the following integer argument in the same printf.
CONFIG_CBPRINTF_FP_SUPPORT=y

# Temporary ESC verification ramp only when needed.
CONFIG_ESC_VERIFY_MODE=n
CONFIG_ESC_VERIFY_START_THROTTLE_PROMILLE=300
CONFIG_ESC_VERIFY_MAX_THROTTLE_PROMILLE=500

# Peripheral drivers
CONFIG_PWM=y
CONFIG_I2C=y

# Sensor subsystem + VL53L1X time-of-flight distance sensor
CONFIG_SENSOR=y
CONFIG_VL53L1X=y
# Polling mode (no INT pin wired). Set to y and add int-gpios to use interrupts.
CONFIG_VL53L1X_INTERRUPT_MODE=n
