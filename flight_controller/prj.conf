# Simulation mode: motor commands are printed to the console so the
# host-side drone simulation can read them.
CONFIG_SIMULATION_MODE=n

# Temporary ESC verification ramp only when needed.
CONFIG_ESC_VERIFY_MODE=n
CONFIG_ESC_VERIFY_START_THROTTLE_PROMILLE=300
CONFIG_ESC_VERIFY_MAX_THROTTLE_PROMILLE=500

# Peripheral drivers
CONFIG_PWM=y
CONFIG_I2C=y
