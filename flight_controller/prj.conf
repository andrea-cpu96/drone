# Simulation mode: motor commands are printed to the console so the
# host-side drone simulation can read them.
CONFIG_SIMULATION_MODE=n

# Enable floating-point support in printf/printk so the altitude (in meters,
# with decimals) can be logged with "%f". Without this, "%f" is not formatted
# and would also corrupt the following integer argument in the same printf.
CONFIG_CBPRINTF_FP_SUPPORT=y

# Temporary ESC verification ramp only when needed.
CONFIG_ESC_VERIFY_MODE=n
#CONFIG_ESC_VERIFY_START_THROTTLE_PROMILLE=300
#CONFIG_ESC_VERIFY_MAX_THROTTLE_PROMILLE=500

# Peripheral drivers
CONFIG_PWM=y
CONFIG_I2C=y
# SPI bus for the BMI088 IMU (accelerometer + gyroscope on SPI2).
CONFIG_SPI=y

# Sensor subsystem + VL53L1X time-of-flight distance sensor
CONFIG_SENSOR=y
CONFIG_VL53L1X=y
# Polling mode (no INT pin wired). Set to y and add int-gpios to use interrupts.
CONFIG_VL53L1X_INTERRUPT_MODE=n

# BMI088 6-axis IMU (bosch,bmi08x-accel + -gyro on SPI2).
CONFIG_BMI08X=y
# Polling mode (no INT pin wired). Trigger modes need int-gpios in the DT nodes.
CONFIG_BMI08X_ACCEL_TRIGGER_NONE=y
CONFIG_BMI08X_GYRO_TRIGGER_NONE=y
# Required to BUILD the Zephyr BMI08X driver in this version, not by our code.
# We still read via the synchronous sensor API.
CONFIG_SENSOR_ASYNC_API=y

# Kernel timing: 10 kHz tick (100 us resolution) for lower quantization jitter on
# the periodic control loop. Tickless kernel keeps the overhead low (the hardware
# timer is programmed to the next event, so the higher tick rate does not add a
# constant periodic ISR).
CONFIG_TICKLESS_KERNEL=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=10000
